<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TankMasters.io — мобильный танковый шутер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0a0f1a;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, monospace;
            touch-action: none;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        
        /* МЕНЮ */
        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .menu-card {
            background: linear-gradient(145deg, #1a2a3a, #0a121f);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            border: 2px solid #ffaa44;
            box-shadow: 0 0 50px rgba(255,170,68,0.3);
            max-width: 90%;
        }
        
        h1 {
            font-size: 8vw;
            background: linear-gradient(135deg, #ffaa44, #ff6644);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
        .nick-input {
            background: #0a0f1e;
            border: 2px solid #ffaa44;
            padding: 12px 20px;
            font-size: 16px;
            color: #ffcc88;
            border-radius: 40px;
            width: 80%;
            text-align: center;
            outline: none;
            margin: 20px 0;
        }
        
        .play-btn {
            background: linear-gradient(135deg, #ffaa44, #ff6644);
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
        }
        
        /* МОБИЛЬНЫЙ ИНТЕРФЕЙС (ДЖОЙСТИКИ) */
        .joystick {
            position: fixed;
            width: 140px;
            height: 140px;
            border-radius: 70px;
            background: rgba(30,40,60,0.4);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,170,68,0.5);
            z-index: 50;
            touch-action: none;
        }
        
        .joystick-base {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 70px;
            background: rgba(0,0,0,0.3);
        }
        
        .joystick-thumb {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: rgba(255,170,68,0.8);
            top: 40px;
            left: 40px;
            transition: 0.05s linear;
        }
        
        #joystickMove {
            bottom: 30px;
            left: 30px;
        }
        
        #joystickShoot {
            bottom: 30px;
            right: 30px;
        }
        
        /* ВЕРХНЯЯ ПАНЕЛЬ ПРОКАЧКИ */
        .upgrade-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            z-index: 40;
            pointer-events: auto;
        }
        
        .upgrade-btn {
            background: #2a3a4a;
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
            color: #ffcc88;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .upgrade-btn[data-stat="speed"] { border-left: 3px solid #88ff88; }
        .upgrade-btn[data-stat="reload"] { border-left: 3px solid #ffaa44; }
        .upgrade-btn[data-stat="damage"] { border-left: 3px solid #ff6644; }
        .upgrade-btn[data-stat="penetration"] { border-left: 3px solid #ff44ff; }
        .upgrade-btn[data-stat="maxHp"] { border-left: 3px solid #44ff44; }
        
        /* МИНИ-КАРТА */
        .minimap {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            border: 2px solid #ffaa44;
            z-index: 45;
            pointer-events: none;
        }
        
        .minimap canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
        
        /* ТАБЛИЦА ЛИДЕРОВ */
        .leaderboard {
            position: fixed;
            top: 100px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 8px 12px;
            min-width: 130px;
            z-index: 40;
            pointer-events: none;
            font-size: 11px;
            color: #ffdd99;
            border: 1px solid #ffaa44;
        }
        
        .leaderboard h4 {
            font-size: 10px;
            margin-bottom: 5px;
            text-align: center;
            color: #ffaa44;
        }
        
        .leaderboard div {
            font-family: monospace;
        }
        
        /* ИНФО ПАНЕЛЬ */
        .stats-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 11px;
            color: #ffdd99;
            z-index: 40;
            pointer-events: none;
            text-align: right;
        }
        
        .skill-points {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            color: #ffaa44;
            z-index: 40;
            pointer-events: none;
            font-weight: bold;
        }
        
        @media (max-width: 700px) {
            .joystick { width: 110px; height: 110px; }
            .joystick-thumb { width: 45px; height: 45px; top: 32.5px; left: 32.5px; }
            .minimap { width: 90px; height: 90px; }
            .upgrade-btn { font-size: 8px; padding: 4px 8px; }
            .leaderboard { font-size: 9px; min-width: 100px; top: 80px; }
        }
        
        @media (max-width: 500px) {
            .joystick { width: 90px; height: 90px; }
            .joystick-thumb { width: 38px; height: 38px; top: 26px; left: 26px; }
            .upgrade-btn { font-size: 7px; padding: 3px 6px; }
        }
    </style>
</head>
<body>

<div id="menu">
    <div class="menu-card">
        <h1>⚡ TANKMASTERS.IO ⚡</h1>
        <div style="color:#8aaacc; margin-bottom:20px;">два джойстика • прокачка • полигоны</div>
        <input type="text" id="nickInput" class="nick-input" placeholder="ИМЯ ТАНКИСТА" maxlength="16">
        <br>
        <button id="playBtn" class="play-btn">🚀 В БОЙ</button>
    </div>
</div>

<!-- Левая джойстик (движение) -->
<div id="joystickMove" class="joystick" style="display: none;">
    <div class="joystick-base"></div>
    <div id="moveThumb" class="joystick-thumb"></div>
</div>

<!-- Правый джойстик (стрельба) -->
<div id="joystickShoot" class="joystick" style="display: none;">
    <div class="joystick-base"></div>
    <div id="shootThumb" class="joystick-thumb"></div>
</div>

<!-- Панель прокачки -->
<div id="upgradePanel" class="upgrade-panel" style="display: none;">
    <button class="upgrade-btn" data-stat="speed">🏃 Скорость</button>
    <button class="upgrade-btn" data-stat="reload">⚡ Перезарядка</button>
    <button class="upgrade-btn" data-stat="damage">💥 Урон</button>
    <button class="upgrade-btn" data-stat="penetration">🎯 Пробитие</button>
    <button class="upgrade-btn" data-stat="maxHp">❤️ Здоровье</button>
</div>

<!-- Очки прокачки -->
<div id="skillPointsDisplay" class="skill-points" style="display: none;">🔧 Очки: 0</div>

<!-- Статистика -->
<div class="stats-panel" id="statsPanel" style="display: none;">
    <div>Lv.<span id="levelValue">1</span> | ❤️ <span id="hpValue">100</span>%</div>
    <div>💥 <span id="damageStat">12</span> | ⚡ <span id="reloadStat">0.8</span></div>
</div>

<!-- Таблица лидеров -->
<div id="leaderboard" class="leaderboard" style="display: none;">
    <h4>🏆 ЛИДЕРЫ</h4>
    <div id="leaderboardList">1. Вы — 0 XP</div>
</div>

<!-- Мини-карта -->
<div id="minimap" class="minimap" style="display: none;">
    <canvas id="minimapCanvas" width="120" height="120"></canvas>
</div>

<canvas id="canvas"></canvas>

<script src="game.js"></script>
</body>
</html>
